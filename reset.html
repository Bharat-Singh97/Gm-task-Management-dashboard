<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <link rel="stylesheet" href="reset.css" />
</head>
<body>
  <h2>Reset Your Password</h2>

  <input type="email" id="resetEmail" placeholder="Enter your email" /><br><br>
  <button onclick="sendPasswordReset()">Send Reset Link</button>

  <p><a href="login.html">Back to Login</a></p>

  <script type="module">
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";
    import { auth } from './firebase.js';

    window.sendPasswordReset = function () {
      const email = document.getElementById("resetEmail").value;

      if (!email) {
        alert("Please enter your email.");
        return;
      }

      sendPasswordResetEmail(auth, email)
        .then(() => {
          alert("Password reset link sent to your email.");
        })
        .catch(error => {
          console.error(error);
          alert("Error: " + error.message);
        });
    }
  </script>
</body>
</html>
